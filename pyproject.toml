[project]
name = "ttaeval"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.11.1"
dependencies = [
    "matplotlib>=3.10.7",
    "msclap>=1.3.4",
    "pandas>=2.3.3",
    "ruff>=0.14.9",
    "torch>=2.6.0",
    "torchaudio==2.6.0",
    "torchvision>=0.21.0",
    "tqdm>=4.67.1",
    "wandb>=0.23.0",
    "laion-clap>=1.1.6",
    "sam-audio",
]

[tool.uv.sources]
torch = [{ index = "pytorch-cu118" }]
torchaudio = [{ index = "pytorch-cu118" }]
torchvision = [{ index = "pytorch-cu118" }]
sam-audio = { git = "https://github.com/kento2247/sam-audio.git" }

[[tool.uv.index]]
name     = "pytorch-cu118"
url      = "https://download.pytorch.org/whl/cu118"
explicit = true
